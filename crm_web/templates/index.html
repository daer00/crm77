<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM77 — Кабинет пользователя</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="site-nav">
    <div class="brand">CRM77</div>
    <nav>
      <a href="/">Главная</a>
      <a href="/contacts">Контакты</a>
      <a href="/deals">Сделки</a>
      <a href="/admin">Админ</a>
    </nav>
    <a class="cta" href="/admin">Связаться с админом</a>
  </header>
  <main class="container">
    <section class="grid">
      <article class="card">
        <h2>Компании</h2>
        <div class="list small">
          {% for company in companies %}
            <a class="item company-link" href="/companies/{{ company.id }}">
              <strong>{{ company.name }}</strong>
              <span>{{ company.contacts_count }} контактов</span>
            </a>
          {% endfor %}
        </div>
      </article>

      <article class="card">
        <h2>Добавить контакт</h2>
        <form method="post" action="/contacts" class="form">
          <input name="first_name" placeholder="Имя" required />
          <input name="last_name" placeholder="Фамилия" />
          <input name="company_name" placeholder="Компания" />
          <input name="position" placeholder="Должность" />
          <input name="contact_type" placeholder="Тип контакта" />
          <input name="work_phone" placeholder="Рабочий телефон" />
          <input name="mobile_phone" placeholder="Мобильный телефон" />
          <input name="work_email" placeholder="Рабочий e-mail" type="email" />
          <input name="personal_email" placeholder="Личный e-mail" type="email" />
          <input name="source" placeholder="Источник" />
          <button type="submit">Сохранить контакт</button>
        </form>
      </article>

      <article class="card">
        <h2>Добавить сделку</h2>
        <form method="post" action="/deals" class="form">
          <input name="title" placeholder="Название сделки" required />
          <input name="company_name" placeholder="Компания" required />
          <input name="amount" placeholder="Сумма" type="number" step="0.01" />
          <input name="scope" placeholder="Область сделки" />
          <select name="status">
            <option value="new">Новая</option>
            <option value="in_progress">В работе</option>
            <option value="won">Успешно</option>
            <option value="lost">Потеряна</option>
          </select>
          <input name="notes" placeholder="Комментарий" />
          <button type="submit">Создать сделку</button>
        </form>
      </article>
    </section>

  </main>
</body>
</html>
